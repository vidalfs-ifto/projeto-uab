{% extends "layout.html" %}
{% block content %}
<div class="row">
    <div class="col-md-8">
        <h3>Gestão de Atendentes</h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                {% for atendente in atendentes %}
                <tr>
                    <td>{{ atendente.nome }}</td>
                    <td>{{ atendente.email }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="col-md-4">
        <h3>Cadastrar Atendente</h3>
        <form method="POST">
            <div class="mb-3">
                <label>Nome</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Criar Atendente</button>
        </form>
    </div>
</div>
{% endblock %}
