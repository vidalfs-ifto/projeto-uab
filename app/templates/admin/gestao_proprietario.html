{% extends "layout.html" %}
{% block content %}
<div class="row">
    <div class="col-md-8">
        <h3>Gestão de Admins e Proprietários</h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in usuarios %}
                <tr>
                    <td>{{ usuario.nome }}</td>
                    <td>{{ usuario.email }}</td>
                    <td>{{ usuario.role }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="col-md-4">
        <h3>Cadastrar Admin/Proprietário</h3>
        <form method="POST">
            <div class="mb-3">
                <label>Nome</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Role</label>
                <select name="role" class="form-select" required>
                    <option value="ADMINISTRADOR">ADMINISTRADOR</option>
                    <option value="PROPRIETARIO">PROPRIETARIO</option>
                </select>
            </div>
            <button type="submit" class="btn btn-danger w-100">Criar Usuário</button>
        </form>
    </div>
</div>
{% endblock %}
